<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160">
  <!--
    Paper-grain texture for the parchment map look.
    Tweakable:
      baseFrequency - higher = finer grain, lower = larger blotches
      numOctaves    - more octaves = more detail
      type          - "fractalNoise" (soft) or "turbulence" (harsher)
    stitchTiles="stitch" keeps it seamless when repeated.
  -->
  <filter id="n">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
  </filter>
  <rect width="100%" height="100%" filter="url(#n)" />
</svg>
